services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${DB_NAME:-valuecrop}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-1234}
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./Backend/valuecrop
    ports:
      - "1234:1234"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/${DB_NAME:-valuecrop}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-1234}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./Frontend/Fsad/Folder1
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL}
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
