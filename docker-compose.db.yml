version: '3.8'

services:
  db:
    build: ./Database
    container_name: valuecrop-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: valuecrop
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: valuecrop_user
      MYSQL_PASSWORD: valuecrop_pass
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s

volumes:
  db_data:
    driver: local
