services:
  # 1. Private MySQL Database Service
  - type: pserv
    name: valuecrop-db
    runtime: docker
    dockerfilePath: ./Database/Dockerfile
    disk:
      name: mysql-data
      mountPath: /var/lib/mysql
      sizeGB: 1
    envVars:
      - key: MYSQL_ROOT_PASSWORD
        generateValue: true   
      - key: MYSQL_DATABASE
        value: valuecrop

  # 2. Spring Boot Backend Service
  - type: web
    name: valuecrop-backend
    runtime: docker
    dockerfilePath: ./Backend/valuecrop/Dockerfile
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: jdbc:mysql://valuecrop-db:3306/valuecrop
      - key: SPRING_DATASOURCE_USERNAME
        value: root
      - key: SPRING_DATASOURCE_PASSWORD
        fromService:
          type: pserv
          name: valuecrop-db
          envVarKey: MYSQL_ROOT_PASSWORD
      # Automatically generated by Render, useful for the frontend to know where the backend is
      - key: RENDER_EXTERNAL_URL
        sync: false
