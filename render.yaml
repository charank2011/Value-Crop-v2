services:
  # Backend Service  
  - type: web
    name: valuecrop-backend
    runtime: docker
    plan: starter
    dockerfilePath: ./Backend/valuecrop/Dockerfile
    port: 1234
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: jdbc:mysql://your-database-host:3306/valuecrop
      - key: SPRING_DATASOURCE_USERNAME
        value: root
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
