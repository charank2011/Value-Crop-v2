services:
  # Backend Service  
  - type: web
    name: valuecrop-backend
    runtime: docker
    plan: starter
    dockerfilePath: ./Backend/valuecrop/Dockerfile
    port: 1234
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: jdbc:mysql://valuecrop-db:3306/valuecrop
      - key: SPRING_DATASOURCE_USERNAME
        value: root
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
  
  # Frontend Service
  - type: web
    name: valuecrop-frontend
    runtime: docker
    plan: starter
    dockerfilePath: ./Frontend/Fsad/Folder1/Dockerfile
    port: 80
    envVars:
      - key: VITE_API_BASE_URL
        value: https://valuecrop-backend.onrender.com
